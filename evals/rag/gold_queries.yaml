schema_version: 2
ks: [1, 3, 5, 10]
thresholds:
  recall_at_3: 0.75
  recall_at_5: 1.0
  mrr: 0.70
  ndcg_at_5: 0.75
  extraction_pass_rate: 1.0

extraction:
  - source: sample_report.md
    modalities:
      text: 1
    facts:
      - id: route
        expect_all: ["五阶段", "里程碑"]
      - id: warning-window
        expect_any: ["0–1 小时"]

  - source: metrics.md
    modalities:
      text: 1
    facts:
      - id: sample-count
        expect_all: ["2920", "时次"]
      - id: deliverables
        expect_all: ["模型源代码", "研制报告"]

queries:
  - id: intro_purpose
    category: text
    query: "引言 编写目的 段落结构"
    relevant:
      - source: sample_report.md
        expect_any: ["编写目的", "引言"]
        grade: 2
    top_k: 3

  - id: delivery_metrics
    category: exact-term
    query: "性能指标 FY-4 全通道"
    relevant:
      - source: metrics.md
        expect_all: ["FY-4", "全通道"]
        grade: 2
    top_k: 3

  - id: tech_route
    category: semantic
    query: "技术路线 五阶段 里程碑"
    relevant:
      - source: sample_report.md
        expect_all: ["五阶段", "里程碑"]
        grade: 2
    top_k: 5

  - id: delivery_list
    category: list
    query: "交付清单 研制报告 源代码"
    relevant:
      - source: metrics.md
        expect_all: ["研制报告", "源代码"]
        grade: 2
    top_k: 3

  - id: short_term_warning
    category: paraphrase
    query: "项目要求的临近预报时间范围是多少"
    relevant:
      - source: sample_report.md
        expect_any: ["0–1 小时", "预警时效"]
        grade: 2
      - source: metrics.md
        expect_any: ["0–1 小时", "预警时效"]
        grade: 1
    top_k: 5

  - id: quantitative_sample_count
    category: numeric
    query: "任务要求至少处理多少个时次"
    relevant:
      - source: metrics.md
        expect_all: ["2920", "时次"]
        grade: 2
    top_k: 5
